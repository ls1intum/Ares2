thisPolicyFileCompliesToThePolicyVersion: 1
regardingTheSupervisedCode:
  theFollowingProgrammingLanguageConfigurationIsUsed: JAVA_USING_MAVEN_ARCHUNIT_AND_ASPECTJ
  theSupervisedCodeUsesTheFollowingPackage: "de.tum.cit.ase.ares"
  theMainClassInsideThisPackageIs: "Main"
  theFollowingClassesAreTestClasses:
    - "de.tum.cit.ase.ares.integration.aop.allowed.SystemAccessTest"
    - "de.tum.cit.ase.ares.integration.aop.forbidden.SystemAccessTest"
    - "de.tum.cit.ase.ares.integration.architecture.forbidden.SystemAccessTest"
  theFollowingResourceAccessesArePermitted:
    regardingFileSystemInteractions:
      - readAllFiles: false
        overwriteAllFiles: true
        createAllFiles: true
        executeAllFiles: false
        deleteAllFiles: false
        onThisPathAndAllPathsBelow: "src/test/java/de/tum/cit/ase/ares/integration/aop/forbidden/subject/fileSystem/read/copy"
      - readAllFiles: true
        overwriteAllFiles: false
        createAllFiles: false
        executeAllFiles: false
        deleteAllFiles: false
        onThisPathAndAllPathsBelow: "src/test/java/de/tum/cit/ase/ares/integration/aop/forbidden/subject/fileSystem/overwrite/nottrusteddir/nottrusted.txt"
    regardingNetworkConnections: []
    regardingCommandExecutions: []
    regardingThreadCreations: []
    regardingPackageImports: []
    regardingTimeouts:
      - timeout: 3000
