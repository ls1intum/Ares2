thisPolicyFileCompliesToThePolicyVersion: 1
regardingTheSupervisedCode:
  theFollowingProgrammingLanguageConfigurationIsUsed: JAVA_USING_MAVEN_ARCHUNIT_AND_ASPECTJ
  theSupervisedCodeUsesTheFollowingPackage: "de.tum.cit.ase.ares"
  theMainClassInsideThisPackageIs: "Main"
  theFollowingClassesAreTestClasses:
    - "de.tum.cit.ase.ares.integration.aop.allowed.SystemAccessTest"
    - "de.tum.cit.ase.ares.integration.aop.forbidden.SystemAccessTest"
    - "de.tum.cit.ase.ares.integration.architecture.forbidden.SystemAccessTest"
    - "de.tum.cit.ase.ares.integration.aop.allowed.FileSystemAccessTest"
    - "de.tum.cit.ase.ares.integration.aop.allowed.FileSystemAccessExecuteTest"
  theFollowingResourceAccessesArePermitted:
    regardingFileSystemInteractions:
      - readAllFiles: true
        overwriteAllFiles: false
        createAllFiles: false
        executeAllFiles: true
        deleteAllFiles: false
        onThisPathAndAllPathsBelow: "src/test/java/de/tum/cit/ase/ares/integration/aop/allowed/subject/trustedExecute.bat"
      - readAllFiles: true
        overwriteAllFiles: false
        createAllFiles: false
        executeAllFiles: true
        deleteAllFiles: false
        onThisPathAndAllPathsBelow: "src/test/java/de/tum/cit/ase/ares/integration/aop/allowed/subject/trustedExecute.sh"
      - readAllFiles: true
        overwriteAllFiles: true
        createAllFiles: true
        executeAllFiles: false
        deleteAllFiles: true
        onThisPathAndAllPathsBelow: "src/test/java/de/tum/cit/ase/ares/integration/aop/allowed/subject/trusted_output.txt"
    regardingNetworkConnections: [ ]
    regardingCommandExecutions:
      - executeTheCommand: "src/test/java/de/tum/cit/ase/ares/integration/aop/allowed/subject/trustedExecute.bat"
        withTheseArguments: [ ]
      - executeTheCommand: "src/test/java/de/tum/cit/ase/ares/integration/aop/allowed/subject/trustedExecute.sh"
        withTheseArguments: [ ]
    regardingThreadCreations: [ ]
    regardingPackageImports: [ ]
    regardingTimeouts:
      - timeout: 3000
