regardingTheSupervisedCode:
  theFollowingProgrammingLanguageConfigurationIsUsed: JAVA_USING_MAVEN_ARCHUNIT_AND_ASPECTJ
  theSupervisedCodeUsesTheFollowingPackage: "de.tum.cit.ase.ares"
  theMainClassInsideThisPackageIs: "Main"
  theFollowingClassesAreTestClasses:
    - "de.tum.cit.ase.ares.integration.testuser.ValidationUser"
    - "de.tum.cit.ase.ares.integration.ValidationTest"
    - "de.tum.cit.ase.ares.testutilities."
  # ValidationUser's former @AllowLocalPort/@AllowThreads values were deliberately INVALID
  # (e.g. port 100000, negative counts) used to drive the now-retired configuration-validation
  # assertions in ValidationTest. Invalid values are not representable as valid Ares 2
  # permissions, so the equivalent is an active policy with no permitted resource accesses.
  theFollowingResourceAccessesArePermitted:
    regardingFileSystemInteractions: []
    regardingNetworkConnections: []
    regardingCommandExecutions: []
    regardingThreadCreations: []
    regardingPackageImports: []
    regardingTimeouts:
      - timeout: 3000
